name: HRM Punch Automation

on:
  schedule:
    # Punch-in: 2:00 AM UTC = 7:30 AM IST (Mon–Fri)
    # GitHub cron drift adds natural randomness of 15–60 mins
    - cron: '0 2 * * 1-5'
    # Punch-out: 10:30 AM UTC = 4:00 PM IST (Mon–Fri)
    - cron: '30 10 * * 1-5'
  # Fix 7: manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Punch mode (in / out / auto)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - in
          - out

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  punch:
    runs-on: ubuntu-24.04

    steps:
      # Fix 1: pinned to latest v4 compatible with Node.js 24
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix 3: install google-chrome-stable (more reliable than chromium-browser)
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Fix 2: Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Fix 4: install from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fix 5: pass secrets as env vars
      - name: Run punch automation
        env:
          HRM_USERNAME: ${{ secrets.HRM_USERNAME }}
          HRM_PASSWORD: ${{ secrets.HRM_PASSWORD }}
          HRM_PUNCH_MODE: ${{ github.event.inputs.mode || secrets.HRM_PUNCH_MODE }}
        run: |
          python punch.py

      - name: Upload punch screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: punch-screenshots-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            punch_in_screenshot.png
            punch_out_screenshot.png
            login_error.png
            attendance_page_error.png
            punch_button_error.png
            punch_error.png
            unexpected_error.png
            debug_*.png
