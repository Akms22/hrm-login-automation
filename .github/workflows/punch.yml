name: HRM Punch Automation

on:
  schedule:
    # Punch-IN: 2:00 AM UTC = 7:30 AM IST (Mon–Fri)
    # HRM_PUNCH_MODE is hardcoded to 'in' — no auto-mode guessing
    - cron: '0 2 * * 1-5'
    # Punch-OUT: 10:30 AM UTC = 4:00 PM IST (Mon–Fri)
    # HRM_PUNCH_MODE is hardcoded to 'out' — no auto-mode guessing
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Punch mode'
        required: false
        default: 'in'
        type: choice
        options:
          - in
          - out

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  punch:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine punch mode from cron schedule
        id: punchmode
        run: |
          # If manually triggered, use the input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # Determine mode from current UTC hour
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 12 ]; then
              echo "mode=in" >> $GITHUB_OUTPUT
            else
              echo "mode=out" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run punch automation
        env:
          HRM_USERNAME: ${{ secrets.HRM_USERNAME }}
          HRM_PASSWORD: ${{ secrets.HRM_PASSWORD }}
          HRM_PUNCH_MODE: ${{ steps.punchmode.outputs.mode }}
        run: |
          echo "Running with mode: $HRM_PUNCH_MODE"
          python punch.py

      - name: Upload punch screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: punch-screenshots-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            punch_in_screenshot.png
            punch_out_screenshot.png
            login_error.png
            attendance_page_error.png
            punch_button_error.png
            punch_error.png
            unexpected_error.png
            debug_*.png
